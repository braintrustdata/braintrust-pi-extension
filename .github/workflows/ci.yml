name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, lint, and types
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Smoke test extension entrypoint
        run: pnpm run smoke

      - name: Build package bundle
        run: pnpm run pack

      - name: Verify package contents
        run: pnpm pack --dry-run

  integration-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        pi-version:
          - 0.62.0
          - 0.63.0
          - 0.64.0

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pi compatibility target
        run: pnpm add -D @mariozechner/pi-ai@${{ matrix.pi-version }} @mariozechner/pi-coding-agent@${{ matrix.pi-version }} --no-frozen-lockfile

      - name: Run integration tests against pi ${{ matrix.pi-version }}
        run: pnpm run test:integration
