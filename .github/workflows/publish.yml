#
# Publishes the @braintrust/pi-extension npm package via the shared,
# centrally-maintained release actions in braintrustdata/sdk-actions (pinned by
# SHA below). Bumping that SHA pulls in upstream release-tooling improvements.
#
# Adapted from braintrustdata/sdk-actions .github/workflows/release-js.yml
# @ 8329d48b291c7cc1379618264b9d01071709d4a7
#
# This package has no build step — it ships src/ directly (files: ["src","README.md"])
# and npm publish's `prepack` regenerates src/version.ts. So the shared actions run
# with build: 'false'.
#
# Job boundary:
#   compute-metadata (here) — computes the release coordinates (version/channel/
#                             github_release) from release_type. Pure glue; no checks.
#   validate (shared)       — release policy: tag free, npm version not already published,
#                             channel allowed, SHA well-formed + on the release branch.
#
# Version sync (src/version.ts) and types are NOT re-checked at release: npm publish's
# `prepack` regenerates src/version.ts so the artifact is always correct, and CI gates
# version-sync + types on every push. This workflow is concerned only with release
# policy + publishing, not feature quality.
#
# ─────────────────────────────────────────────────────────────────────────────
# SETUP REQUIREMENTS
# ─────────────────────────────────────────────────────────────────────────────
#
# GitHub Environments (Settings → Environments):
#   publish
#     - Required reviewers: SDK maintainers
#     - Deployment branches: main only
#   publish-dry-run
#     - Required reviewers: at least yourself (to exercise the gate)
#     - Allow administrators to bypass: enabled
#
# npm Trusted Publishing (OIDC — no token):
#   npmjs.com → @braintrust/pi-extension → Settings → Trusted Publisher
#     Repository:  braintrustdata/braintrust-pi-extension
#     Workflow:    publish.yml
#     Environment: publish   ← MUST be added, or the gated publish is rejected (ENEEDAUTH)
#   Provenance requires a PUBLIC package; the publish job needs id-token: write.
#
# Slack (optional — steps self-guard and no-op if unset):
#   Repository variable SLACK_SDK_RELEASE_CHANNEL  (channel ID)
#   Org/repo secret      SLACK_BOT_TOKEN           (Brainbot token; invite it to the channel)
#
# ─────────────────────────────────────────────────────────────────────────────

name: Publish package

concurrency:
  group: publish-${{ inputs.release_type }}-${{ inputs.sha }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease
      sha:
        description: Commit SHA to release (full 40-char SHA)
        required: true
        type: string
      prerelease_suffix:
        description: Optional prerelease suffix (defaults to the run number)
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run: run the pipeline with npm publish --dry-run (no publish, tag, or release)"
        required: false
        default: false
        type: boolean

jobs:
  # Computes the release coordinates (version/channel/github_release) from release_type.
  # Pure glue feeding the shared actions — no quality or safety checks (see header).
  compute-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      github_release: ${{ steps.meta.outputs.github_release }}
      release_type: ${{ steps.meta.outputs.release_type }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1

      - name: Compute release metadata
        id: meta
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          PRERELEASE_SUFFIX: ${{ inputs.prerelease_suffix }}
        run: |
          set -euo pipefail

          CURRENT=$(node -p "require('./package.json').version")
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"

          if [[ "$RELEASE_TYPE" == "stable" ]]; then
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "github_release=true" >> "$GITHUB_OUTPUT"
          else
            SUFFIX="${PRERELEASE_SUFFIX:-$GITHUB_RUN_NUMBER}"
            echo "version=${CURRENT}-rc.${SUFFIX}" >> "$GITHUB_OUTPUT"
            echo "channel=rc" >> "$GITHUB_OUTPUT"
            echo "github_release=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: compute-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      prev_release: ${{ steps.validate.outputs.prev_release }}
      branch: ${{ steps.validate.outputs.branch }}
      on_release_branch: ${{ steps.validate.outputs.on_release_branch }}
      commit_message: ${{ steps.validate.outputs.commit_message }}
    steps:
      - name: Validate release
        id: validate
        uses: braintrustdata/sdk-actions/actions/release/lang/js/validate@8329d48b291c7cc1379618264b9d01071709d4a7
        with:
          sha: ${{ inputs.sha }}
          version: ${{ needs.compute-metadata.outputs.version }} # computed override (esp. prerelease)
          node_version: .tool-versions
          build: "false" # ships src/ directly; no build step
          package_name: "@braintrust/pi-extension"
          tag_format: "pi-extension-v{version}"
          channel: ${{ needs.compute-metadata.outputs.channel }}
          allowed_channels: "latest,rc"
          dry_run: ${{ inputs.dry_run }}

  prepare:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # required for the releases/generate-notes API
    outputs:
      pr_list: ${{ steps.prepare.outputs.pr_list }}
      notes: ${{ steps.prepare.outputs.notes }}
    steps:
      - name: Prepare release
        id: prepare
        uses: braintrustdata/sdk-actions/actions/release/prepare@8329d48b291c7cc1379618264b9d01071709d4a7
        with:
          release_tag: ${{ needs.validate.outputs.release_tag }}
          sha: ${{ inputs.sha }}
          prev_release: ${{ needs.validate.outputs.prev_release }}

  notify-pending:
    needs: [validate, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Notify release pending
        uses: braintrustdata/sdk-actions/actions/release/notify-pending@8329d48b291c7cc1379618264b9d01071709d4a7
        with:
          sha: ${{ inputs.sha }}
          release_tag: ${{ needs.validate.outputs.release_tag }}
          prev_release: ${{ needs.validate.outputs.prev_release }}
          branch: ${{ needs.validate.outputs.branch }}
          on_release_branch: ${{ needs.validate.outputs.on_release_branch }}
          commit_message: ${{ needs.validate.outputs.commit_message }}
          pr_list: ${{ needs.prepare.outputs.pr_list }}
          notes: ${{ needs.prepare.outputs.notes }}
          dry_run: ${{ inputs.dry_run }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack_channel: ${{ vars.SLACK_SDK_RELEASE_CHANNEL }}
          label: "@braintrust/pi-extension"

  publish:
    needs: [compute-metadata, validate, prepare, notify-pending]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.dry_run && 'publish-dry-run' || 'publish' }}
    permissions:
      contents: write
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      # Write the computed version into package.json before publish. For a prerelease
      # this applies the -rc.N suffix; for stable it's a no-op (same version). publish
      # runs with checkout:false so this survives; npm publish's prepack regenerates
      # src/version.ts to match.
      - name: Patch package.json version
        env:
          VERSION: ${{ needs.compute-metadata.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.env.VERSION;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Publish
        uses: braintrustdata/sdk-actions/actions/release/lang/js/publish@8329d48b291c7cc1379618264b9d01071709d4a7
        with:
          sha: ${{ inputs.sha }}
          checkout: "false" # keep the patched package.json (checked out + patched above)
          build: "false" # ships src/ directly; no build step
          node_version: .tool-versions
          version: ${{ needs.compute-metadata.outputs.version }}
          release_tag: ${{ needs.validate.outputs.release_tag }}
          channel: ${{ needs.compute-metadata.outputs.channel }}
          github_release: ${{ needs.compute-metadata.outputs.github_release }} # stable only
          release_title: "@braintrust/pi-extension v${{ needs.compute-metadata.outputs.version }}"
          package_name: "@braintrust/pi-extension"
          label: "@braintrust/pi-extension"
          dry_run: ${{ inputs.dry_run }}
          notes: ${{ needs.prepare.outputs.notes }}
          prev_release: ${{ needs.validate.outputs.prev_release }}
          branch: ${{ needs.validate.outputs.branch }}
          on_release_branch: ${{ needs.validate.outputs.on_release_branch }}
          pr_list: ${{ needs.prepare.outputs.pr_list }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack_channel: ${{ vars.SLACK_SDK_RELEASE_CHANNEL }}
