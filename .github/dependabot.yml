version: 2
updates:
  # Dependabot requires each update entry to have a unique
  # package-ecosystem/directory/target-branch combination, so we keep npm
  # updates in a single config block.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
