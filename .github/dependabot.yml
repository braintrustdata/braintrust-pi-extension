version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    allow:
      - dependency-name: "@mariozechner/pi-ai"
      - dependency-name: "@mariozechner/pi-coding-agent"
      - dependency-name: braintrust

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "@mariozechner/pi-ai"
      - dependency-name: "@mariozechner/pi-coding-agent"
      - dependency-name: braintrust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
